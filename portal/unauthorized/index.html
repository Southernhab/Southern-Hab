<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Denied — SHC Landowner Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
<link rel="stylesheet" href="/style.css">
<style>
html,body{margin:0;padding:0;min-height:100vh;background:#1F3A2E!important;display:flex;flex-direction:column}
nav.container-fluid{max-width:none;margin:0;padding:.75rem 3vw;background:#13271F!important;border-bottom:1px solid rgba(255,255,255,.1)}
nav ul{align-items:center;margin:0}
nav a{font-size:.82rem;font-weight:600;color:rgba(255,255,255,.75)!important}
nav a:hover{color:#fff!important}
.brand{font-size:1.15rem;color:#fff!important}
.brand small{display:block;color:rgba(255,255,255,.45)!important;font-size:.6rem;letter-spacing:.16em}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.2rem}
.card{background:#FAF9F5;border-radius:2px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:2.5rem;max-width:460px;width:100%;text-align:center}
.card h2{font-family:"Libre Baskerville",Georgia,serif;font-size:1.25rem;color:#1F3A2E;margin:0 0 .5rem}
.card p{font-size:.88rem;color:#66765A;margin:0 0 1.5rem;line-height:1.65}
.btn-row{display:flex;flex-direction:column;gap:.65rem}
.btn{padding:.7rem 1.5rem;border:none;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:2px;text-decoration:none;display:block;text-align:center}
.btn-primary{background:#1F3A2E;color:#fff}
.btn-primary:hover{background:#13271F;color:#fff}
.btn-secondary{background:transparent;color:#1F3A2E;border:1px solid #1F3A2E}
.btn-secondary:hover{background:#1F3A2E;color:#fff}
footer{background:#13271F!important;color:rgba(255,255,255,.4)!important;padding:1.25rem 3vw;font-size:.78rem}
footer a{color:rgba(255,255,255,.5)!important}
</style>
</head><body>
<nav class="container-fluid"><ul><li><strong><a class="brand" href="/">Southern Habitat<small>CONSULTING LLC</small></a></strong></li></ul><ul><li><a href="/portal/">Sign In</a></li></ul></nav>
<main>
  <div class="card">
    <h2 id="heading">Access Denied</h2>
    <p id="message">You do not have permission to view this page.</p>
    <div class="btn-row">
      <a href="/portal/" class="btn btn-primary">Return to Sign In</a>
      <a href="/" class="btn btn-secondary">Main Website</a>
    </div>
  </div>
</main>
<footer><small>© 2026 Southern Habitat Consulting LLC · <a href="/contact/">Contact</a></small></footer>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var reason = params.get('reason');
  var h = document.getElementById('heading');
  var m = document.getElementById('message');
  if (reason === 'disabled') {
    h.textContent = 'Account Deactivated';
    m.textContent = 'Your portal account has been deactivated. Please contact SHC for assistance.';
  } else if (reason === 'role') {
    h.textContent = 'Access Denied';
    m.textContent = 'Your account does not have permission to access this area. If you believe this is an error, contact SHC.';
  }
})();
</script>
</body></html>
