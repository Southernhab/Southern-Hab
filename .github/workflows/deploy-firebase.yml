name: Deploy Firebase Backend

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - 'functions/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rules-only
          - functions-only

jobs:
  deploy-firebase:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Cloud Function dependencies
        run: npm ci
        working-directory: functions

      - name: Set Firebase Functions environment config
        run: |
          firebase functions:config:set \
            shc.email_provider_api_key="${{ secrets.EMAIL_PROVIDER_API_KEY }}" \
            shc.notification_email="${{ secrets.NOTIFICATION_EMAIL }}" \
            shc.email_from="${{ secrets.EMAIL_FROM }}" \
            shc.public_site_url="${{ secrets.PUBLIC_SITE_URL }}" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        continue-on-error: true  # Don't block if secrets aren't set yet

      - name: Deploy — all (rules + indexes + storage + functions)
        if: github.event_name == 'push' || inputs.target == 'all'
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage,functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy — rules only
        if: inputs.target == 'rules-only'
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive

      - name: Deploy — functions only
        if: inputs.target == 'functions-only'
        run: |
          firebase deploy \
            --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --non-interactive
