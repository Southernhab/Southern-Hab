name: Deploy Firebase Backend

on:
  push:
    branches:
      - main
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"
      - "functions/**"
      - ".github/workflows/deploy-firebase.yml"

  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - rules-only
          - functions-only

permissions:
  contents: read
  id-token: write

jobs:
  deploy-firebase:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: google-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Google authentication
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_GHA_CREDS_PATH: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          gcloud auth list
          gcloud config set project "${{ secrets.FIREBASE_PROJECT_ID }}"
          gcloud projects describe "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Install Cloud Function dependencies
        working-directory: functions
        run: npm install

      - name: Verify Firebase authentication
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_GHA_CREDS_PATH: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Firebase authentication attempt $attempt of 5"

            if firebase projects:list --non-interactive --debug; then
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep $((attempt * 10))
            fi
          done

          echo "Firebase authentication failed after 5 attempts."
          exit 1

      - name: Deploy all
        if: github.event_name == 'push' || inputs.target == 'all'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_GHA_CREDS_PATH: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "Firebase deployment attempt $attempt of 3"

            if firebase deploy \
              --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --only "firestore:rules,firestore:indexes,storage,functions" \
              --non-interactive \
              --debug; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Firebase deployment failed after 3 attempts."
          exit 1

      - name: Deploy rules only
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'rules-only'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_GHA_CREDS_PATH: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "Rules deployment attempt $attempt of 3"

            if firebase deploy \
              --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --only "firestore:rules,firestore:indexes,storage" \
              --non-interactive \
              --debug; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Rules deployment failed after 3 attempts."
          exit 1

      - name: Deploy functions only
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'functions-only'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_GHA_CREDS_PATH: ${{ steps.google-auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "Functions deployment attempt $attempt of 3"

            if firebase deploy \
              --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
              --only "functions" \
              --non-interactive \
              --debug; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Functions deployment failed after 3 attempts."
          exit 1
