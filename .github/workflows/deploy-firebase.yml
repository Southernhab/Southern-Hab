name: Deploy Firebase Backend

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - 'functions/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rules-only
          - functions-only

permissions:
  contents: read
  id-token: write

jobs:
  deploy-firebase:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Cloud Function dependencies
        run: npm ci
        working-directory: functions

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy — all (rules + indexes + storage + functions)
        if: github.event_name == 'push' || inputs.target == 'all'
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --only firestore:rules,firestore:indexes,storage,functions \
            --non-interactive

      - name: Deploy — rules only
        if: inputs.target == 'rules-only'
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --only firestore:rules,firestore:indexes,storage \
            --non-interactive

      - name: Deploy — functions only
        if: inputs.target == 'functions-only'
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --only functions \
            --non-interactive
