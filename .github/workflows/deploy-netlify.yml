name: Deploy Netlify Frontend

on:
  push:
    branches:
      - main
    paths-ignore:
      - "functions/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "supabase-archive/**"
      - "scripts/**"
      - "**.md"
      - ".github/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  deploy-netlify:
    name: Validate and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run breadcrumb check
        run: node scripts/check-breadcrumbs.js

      - name: Generate Firebase config files
        run: |
          cat > portal/firebase-config.js <<'EOF'
          window.__SHC_FIREBASE_CONFIG__={
            apiKey:'${{ secrets.FIREBASE_API_KEY }}',
            authDomain:'${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId:'${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket:'${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId:'${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId:'${{ secrets.FIREBASE_APP_ID }}',
            functionsUrl:'https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net'
          };
          EOF

          cp portal/firebase-config.js admin/firebase-config.js

      - name: Verify required Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN is missing or empty."
            exit 1
          fi

          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID is missing or empty."
            exit 1
          fi

          echo "Both Netlify secrets are present."

      - name: Verify Netlify user token
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          HTTP_STATUS=$(curl --silent \
            --output /tmp/netlify-user.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/user")

          echo "Netlify user verification returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::The Netlify access token is invalid, expired, or unauthorized."
            exit 1
          fi

          USER_EMAIL=$(jq -r '.email // "unknown"' /tmp/netlify-user.json)
          USER_NAME=$(jq -r '.full_name // .name // "unknown"' /tmp/netlify-user.json)

          echo "Token user: $USER_NAME"
          echo "Token email: $USER_EMAIL"

      - name: Resolve accessible Netlify project
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          RAW_LENGTH=${#NETLIFY_SITE_ID}

          CLEAN_SITE_ID=$(printf '%s' "$NETLIFY_SITE_ID" \
            | grep -Eo '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' \
            | head -n 1 \
            | tr '[:upper:]' '[:lower:]')

          echo "Stored NETLIFY_SITE_ID length: $RAW_LENGTH"

          if [ -z "$CLEAN_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID does not contain a valid UUID-format Project ID."
            exit 1
          fi

          echo "Normalized Project ID: $CLEAN_SITE_ID"

          HTTP_STATUS=$(curl --silent \
            --output /tmp/netlify-sites.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites?per_page=100")

          echo "Accessible-project lookup returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::The token could not retrieve its accessible Netlify projects."
            cat /tmp/netlify-sites.json
            exit 1
          fi

          SITE_COUNT=$(jq 'length' /tmp/netlify-sites.json)
          echo "Projects visible to this token: $SITE_COUNT"

          echo "Accessible Netlify projects:"
          jq -r '
            .[] |
            "  Name: \(.name // "unknown")
             ID: \(.id // "unknown")
             Custom domain: \(.custom_domain // "none")
             URL: \(.url // "none")
            "
          ' /tmp/netlify-sites.json

          ID_MATCH=$(jq -r \
            --arg site_id "$CLEAN_SITE_ID" \
            '.[] | select((.id | ascii_downcase) == $site_id) | .id' \
            /tmp/netlify-sites.json \
            | head -n 1)

          DOMAIN_MATCH=$(jq -r '
            .[] |
            select(
              (.custom_domain // "") == "southernhabitatconsulting.com"
              or (.custom_domain // "") == "www.southernhabitatconsulting.com"
              or (.url // "") == "https://southernhabitatconsulting.com"
              or (.ssl_url // "") == "https://southernhabitatconsulting.com"
            ) |
            .id
          ' /tmp/netlify-sites.json | head -n 1)

          if [ -n "$ID_MATCH" ]; then
            RESOLVED_SITE_ID="$ID_MATCH"
            echo "The stored Project ID matches a project visible to the token."
          elif [ -n "$DOMAIN_MATCH" ]; then
            RESOLVED_SITE_ID="$DOMAIN_MATCH"
            echo "::warning::The stored Project ID did not match, but the production project was found by its custom domain."
            echo "Using the Project ID returned directly by Netlify."
          else
            echo "::error::The token is valid, but it cannot see the project assigned to southernhabitatconsulting.com."
            echo "::error::Review the token user and the accessible-project list printed above."
            exit 1
          fi

          echo "Resolved Netlify Project ID: $RESOLVED_SITE_ID"
          echo "NETLIFY_RESOLVED_SITE_ID=$RESOLVED_SITE_ID" >> "$GITHUB_ENV"

      - name: Verify resolved project directly
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          HTTP_STATUS=$(curl --silent \
            --output /tmp/resolved-netlify-site.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_RESOLVED_SITE_ID")

          echo "Resolved-project verification returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Netlify listed the project but would not allow direct access to it."
            exit 1
          fi

          SITE_NAME=$(jq -r '.name // "unknown"' /tmp/resolved-netlify-site.json)
          SITE_DOMAIN=$(jq -r '.custom_domain // .url // "unknown"' /tmp/resolved-netlify-site.json)

          echo "Resolved project name: $SITE_NAME"
          echo "Resolved production domain: $SITE_DOMAIN"

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Deploy to production
        if: github.event_name == 'push' || inputs.environment == 'production'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --dir "." \
            --prod \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_RESOLVED_SITE_ID" \
            --message "Deploy from GitHub Actions - ${GITHUB_SHA::7}"

      - name: Deploy preview
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'preview'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --dir "." \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_RESOLVED_SITE_ID" \
            --message "Preview from GitHub Actions - ${GITHUB_SHA::7}"
