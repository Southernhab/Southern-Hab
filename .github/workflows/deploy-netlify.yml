name: Deploy Netlify Frontend

on:
  push:
    branches:
      - main
    paths-ignore:
      - "functions/**"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "supabase-archive/**"
      - "scripts/**"
      - "**.md"
      - ".github/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  deploy-netlify:
    name: Validate and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run breadcrumb check
        run: node scripts/check-breadcrumbs.js

      - name: Verify Firebase frontend secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          missing=0

          for name in \
            FIREBASE_API_KEY \
            FIREBASE_AUTH_DOMAIN \
            FIREBASE_PROJECT_ID \
            FIREBASE_STORAGE_BUCKET \
            FIREBASE_MESSAGING_SENDER_ID \
            FIREBASE_APP_ID
          do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error::$name is missing or empty."
              missing=1
            else
              echo "$name is present."
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build deploy directory
        run: |
          rm -rf _site
          mkdir -p _site

          rsync -a ./ _site/ \
            --exclude ".git" \
            --exclude "_site" \
            --exclude "node_modules" \
            --exclude "functions/node_modules"

          # Remove ignore files inside the deploy folder so generated files are not excluded.
          rm -f _site/.gitignore
          rm -f _site/.netlifyignore

      - name: Generate Firebase config files
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mkdir -p _site/portal
          mkdir -p _site/admin

          cat > _site/portal/firebase-config.js <<EOF
          window.__SHC_FIREBASE_CONFIG__ = {
            apiKey: "$FIREBASE_API_KEY",
            authDomain: "$FIREBASE_AUTH_DOMAIN",
            projectId: "$FIREBASE_PROJECT_ID",
            storageBucket: "$FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "$FIREBASE_MESSAGING_SENDER_ID",
            appId: "$FIREBASE_APP_ID",
            functionsUrl: "https://us-central1-$FIREBASE_PROJECT_ID.cloudfunctions.net"
          };
          EOF

          cp _site/portal/firebase-config.js _site/admin/firebase-config.js

          test -s _site/portal/firebase-config.js
          test -s _site/admin/firebase-config.js

          if grep -q '""' _site/portal/firebase-config.js; then
            echo "::error::Generated Firebase config still contains an empty value."
            exit 1
          fi

          echo "Generated Firebase config files for portal and admin."

      - name: Verify Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN is missing or empty."
            exit 1
          fi

          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID is missing or empty."
            exit 1
          fi

          echo "Both Netlify secrets are present."

      - name: Verify Netlify user token
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          HTTP_STATUS=$(curl --silent \
            --output /tmp/netlify-user.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/user")

          echo "Netlify user verification returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::The Netlify access token is invalid, expired, or unauthorized."
            exit 1
          fi

          USER_EMAIL=$(jq -r '.email // "unknown"' /tmp/netlify-user.json)
          USER_NAME=$(jq -r '.full_name // .name // "unknown"' /tmp/netlify-user.json)

          echo "Token user: $USER_NAME"
          echo "Token email: $USER_EMAIL"

      - name: Resolve accessible Netlify project
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          CLEAN_SITE_ID=$(printf '%s' "$NETLIFY_SITE_ID" \
            | grep -Eo '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' \
            | head -n 1 \
            | tr '[:upper:]' '[:lower:]')

          if [ -z "$CLEAN_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID does not contain a valid UUID-format Project ID."
            exit 1
          fi

          HTTP_STATUS=$(curl --silent \
            --output /tmp/netlify-sites.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites?per_page=100")

          echo "Accessible-project lookup returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::The token could not retrieve its accessible Netlify projects."
            cat /tmp/netlify-sites.json
            exit 1
          fi

          SITE_COUNT=$(jq 'length' /tmp/netlify-sites.json)
          echo "Projects visible to this token: $SITE_COUNT"

          ID_MATCH=$(jq -r \
            --arg site_id "$CLEAN_SITE_ID" \
            '.[] | select((.id | ascii_downcase) == $site_id) | .id' \
            /tmp/netlify-sites.json \
            | head -n 1)

          DOMAIN_MATCH=$(jq -r '
            .[] |
            select(
              (.custom_domain // "") == "southernhabitatconsulting.com"
              or (.custom_domain // "") == "www.southernhabitatconsulting.com"
              or (.url // "") == "https://southernhabitatconsulting.com"
              or (.ssl_url // "") == "https://southernhabitatconsulting.com"
            ) |
            .id
          ' /tmp/netlify-sites.json | head -n 1)

          if [ -n "$ID_MATCH" ]; then
            RESOLVED_SITE_ID="$ID_MATCH"
            echo "The stored Project ID matches a project visible to the token."
          elif [ -n "$DOMAIN_MATCH" ]; then
            RESOLVED_SITE_ID="$DOMAIN_MATCH"
            echo "::warning::Stored Project ID did not match, but the production project was found by custom domain."
          else
            echo "::error::The token is valid, but it cannot see the Southern Habitat Netlify project."
            exit 1
          fi

          echo "NETLIFY_RESOLVED_SITE_ID=$RESOLVED_SITE_ID" >> "$GITHUB_ENV"

      - name: Verify deploy directory contents
        run: |
          echo "Checking generated config files in deploy directory..."
          ls -la _site/portal/firebase-config.js
          ls -la _site/admin/firebase-config.js

          echo "Checking major frontend routes..."
          test -f _site/index.html
          test -f _site/contact/index.html
          test -f _site/portal/index.html
          test -f _site/admin/index.html
          test -f _site/netlify.toml

          echo "Deploy directory is ready."

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Deploy to production
        if: github.event_name == 'push' || inputs.environment == 'production'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --dir "_site" \
            --prod \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_RESOLVED_SITE_ID" \
            --message "Deploy from GitHub Actions - ${GITHUB_SHA::7}"

      - name: Deploy preview
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'preview'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --dir "_site" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_RESOLVED_SITE_ID" \
            --message "Preview from GitHub Actions - ${GITHUB_SHA::7}"
