name: Deploy Netlify Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'supabase-archive/**'
      - 'scripts/**'
      - '**.md'
      - '.github/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy-netlify:
    name: Validate and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run breadcrumb check
        run: node scripts/check-breadcrumbs.js

      - name: Generate Firebase config files
        run: |
          cat > portal/firebase-config.js <<'EOF'
          window.__SHC_FIREBASE_CONFIG__={apiKey:'${{ secrets.FIREBASE_API_KEY }}',authDomain:'${{ secrets.FIREBASE_AUTH_DOMAIN }}',projectId:'${{ secrets.FIREBASE_PROJECT_ID }}',storageBucket:'${{ secrets.FIREBASE_STORAGE_BUCKET }}',messagingSenderId:'${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',appId:'${{ secrets.FIREBASE_APP_ID }}',functionsUrl:'https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net'};
          EOF
          cp portal/firebase-config.js admin/firebase-config.js

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to production
        if: github.event_name == 'push' || inputs.environment == 'production'
        run: |
          netlify deploy \
            --dir . \
            --prod \
            --message "Deploy from GitHub Actions — ${GITHUB_SHA::7}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy preview
        if: inputs.environment == 'preview'
        run: |
          netlify deploy \
            --dir . \
            --message "Preview — ${GITHUB_SHA::7}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
